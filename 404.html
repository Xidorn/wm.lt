<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 - 页面不存在</title>
  <meta name="description" content="页面不存在，正在返回网谋论坛 wm.lt" />
  <style>
    :root {
      --bg: #f7f8fa;
      --card: rgba(255, 255, 255, 0.92);
      --line: rgba(15, 23, 42, 0.08);
      --text: #111827;
      --muted: #6b7280;
      --primary: #0f172a;
      --accent: #2563eb;
      --accent-soft: rgba(37, 99, 235, 0.10);
      --shadow: 0 24px 60px rgba(15, 23, 42, 0.10);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(37, 99, 235, 0.08), transparent 26%),
        radial-gradient(circle at 100% 0%, rgba(15, 23, 42, 0.05), transparent 20%),
        linear-gradient(180deg, #f8fafc 0%, #f7f8fa 45%, #f3f4f6 100%);
      min-height: 100vh;
      padding: 24px;
      overflow: hidden;
    }

    .bg-orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(12px);
      pointer-events: none;
      opacity: 0.7;
    }

    .bg-orb.one {
      width: 260px;
      height: 260px;
      left: -60px;
      top: -60px;
      background: rgba(37, 99, 235, 0.10);
    }

    .bg-orb.two {
      width: 320px;
      height: 320px;
      right: -100px;
      bottom: -100px;
      background: rgba(15, 23, 42, 0.06);
    }

    .wrap {
      width: 100%;
      max-width: 920px;
      min-height: calc(100vh - 48px);
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      justify-content: center;
      position: relative;
      z-index: 1;
    }

    .card {
      position: relative;
      overflow: hidden;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 32px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
      padding: 54px 46px;
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(280px, 0.9fr);
      gap: 32px;
      align-items: center;
    }

    .card::before {
      content: "";
      position: absolute;
      width: 380px;
      height: 380px;
      right: -160px;
      top: -180px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(37, 99, 235, 0.14), transparent 68%);
      pointer-events: none;
    }

    .left,
    .right {
      position: relative;
      z-index: 1;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 18px;
    }

    .badge::before {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent);
    }

    .code {
      font-size: clamp(72px, 12vw, 132px);
      line-height: 0.95;
      font-weight: 800;
      letter-spacing: -4px;
      color: var(--primary);
      margin-bottom: 12px;
    }

    .title {
      font-size: clamp(24px, 4vw, 38px);
      line-height: 1.15;
      letter-spacing: -1px;
      color: var(--primary);
      font-weight: 800;
      margin-bottom: 14px;
    }

    .desc {
      font-size: 16px;
      color: var(--muted);
      line-height: 1.8;
      max-width: 520px;
    }

    .actions {
      margin-top: 28px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .btn-primary {
      min-height: 46px;
      padding: 0 20px;
      border-radius: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
      transition: 0.25s ease;
      color: #fff;
      background: linear-gradient(135deg, #111827, #2563eb);
      box-shadow: 0 12px 28px rgba(37, 99, 235, 0.20);
    }

    .btn-primary:hover {
      transform: translateY(-1px);
    }

    .panel {
      background: rgba(255, 255, 255, 0.84);
      border: 1px solid rgba(15, 23, 42, 0.06);
      border-radius: 24px;
      padding: 22px;
      box-shadow: 0 12px 30px rgba(15, 23, 42, 0.05);
    }

    .panel-title {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 12px;
      font-weight: 600;
    }

    .countdown {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 14px;
    }

    .countdown strong {
      font-size: 54px;
      line-height: 1;
      color: var(--primary);
      font-weight: 800;
      letter-spacing: -2px;
    }

    .countdown span {
      font-size: 15px;
      color: var(--muted);
    }

    .site {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0 14px;
      border-radius: 999px;
      background: rgba(37, 99, 235, 0.08);
      color: var(--accent);
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 14px;
    }

    .tips {
      display: grid;
      gap: 10px;
      margin-top: 10px;
    }

    .tip {
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(248, 250, 252, 0.95);
      border: 1px solid rgba(15, 23, 42, 0.06);
      color: #475569;
      font-size: 14px;
      line-height: 1.6;
    }

    .footer-note {
      text-align: center;
      margin-top: 16px;
      color: var(--muted);
      font-size: 13px;
    }

    .footer-note a {
      color: var(--primary);
      font-weight: 600;
    }

    .footer-note a:hover {
      color: var(--accent);
    }

    @media (max-width: 860px) {
      .wrap {
        min-height: calc(100vh - 48px);
      }

      .card {
        grid-template-columns: 1fr;
        padding: 28px 22px;
        border-radius: 24px;
      }

      .code {
        font-size: 84px;
      }

      .countdown strong {
        font-size: 42px;
      }

      .actions {
        flex-direction: column;
      }

      .btn-primary {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="bg-orb one"></div>
  <div class="bg-orb two"></div>

  <div class="wrap">
    <div class="card">
      <div class="left">
        <div class="badge">页面未找到</div>
        <div class="code">404</div>
        <h1 class="title">你访问的页面不存在</h1>
        <p class="desc">
          这个链接可能已经失效、被删除，或者地址输入有误。页面将自动跳转到网谋论坛首页。
        </p>

        <div class="actions">
          <a class="btn-primary" href="https://wm.lt">返回首页</a>
        </div>
      </div>

      <div class="right">
        <div class="panel">
          <div class="panel-title">自动跳转</div>
          <div class="site">wm.lt</div>

          <div class="countdown">
            <strong id="count">3</strong>
            <span>秒后跳转</span>
          </div>

          <div class="tips">
            <div class="tip">你可以点击“返回首页”立即跳转。</div>
            <div class="tip">如果是旧链接或收藏夹地址，建议更新为最新首页地址。</div>
          </div>
        </div>
      </div>
    </div>

    <div class="footer-note">© 2026 <a href="https://wm.lt" target="_blank" title="网谋论坛">网谋论坛</a> 版权所有</div>
  </div>

  <script>
    (function () {
      var count = 3;
      var countEl = document.getElementById("count");
      var timer = setInterval(function () {
        count--;
        if (countEl) countEl.textContent = count;
        if (count <= 0) {
          clearInterval(timer);
          window.location.href = "https://wm.lt";
        }
      }, 1000);
    })();
  </script>
</body>
</html>
